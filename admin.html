<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Barbara Friehs</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<style>
  :root {
    --dark: #1a1612;
    --cream: #f5f0e8;
    --accent: #c8a882;
    --muted: #6b6158;
    --serif: 'Georgia', serif;
    --sans: system-ui, sans-serif;
    --card-bg: #ffffff;
    --border: rgba(26,22,18,.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--sans); background: var(--cream); color: var(--dark); min-height: 100vh; }

  /* LOGIN */
  #login-screen {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 2rem;
  }
  .login-box {
    background: var(--card-bg); border: 1px solid var(--border);
    padding: 3rem 2.5rem; max-width: 380px; width: 100%; text-align: center;
  }
  .login-box h1 { font-family: var(--serif); font-weight: 300; font-size: 1.8rem; margin-bottom: .3rem; }
  .login-box p { font-size: .8rem; color: var(--muted); margin-bottom: 2rem; letter-spacing: .05em; }
  .login-box input {
    width: 100%; padding: .8rem 1rem; border: 1px solid var(--border);
    background: var(--cream); font-size: .9rem; outline: none;
    transition: border-color .2s; margin-bottom: 1rem;
  }
  .login-box input:focus { border-color: var(--accent); }
  .login-box button {
    width: 100%; padding: .85rem; background: var(--dark); color: var(--cream);
    border: none; font-size: .75rem; letter-spacing: .2em; text-transform: uppercase;
    cursor: pointer; transition: background .2s;
  }
  .login-box button:hover { background: #2d2720; }
  .login-error { color: #c0392b; font-size: .8rem; margin-top: .8rem; display: none; }

  /* DASHBOARD */
  #dashboard { display: none; }
  header.dash-header {
    background: var(--dark); color: var(--cream);
    padding: 1.2rem 2rem; display: flex; align-items: center; justify-content: space-between;
  }
  header.dash-header h1 { font-family: var(--serif); font-weight: 300; font-size: 1.2rem; }
  header.dash-header span { font-size: .7rem; color: var(--accent); letter-spacing: .15em; text-transform: uppercase; }
  .logout-btn {
    background: none; border: 1px solid rgba(200,168,130,.3); color: var(--accent);
    padding: .4rem .9rem; font-size: .7rem; letter-spacing: .15em; text-transform: uppercase;
    cursor: pointer; transition: border-color .2s;
  }
  .logout-btn:hover { border-color: var(--accent); }

  .dash-content { padding: 2rem; max-width: 1100px; margin: 0 auto; }

  .period-label { font-size: .7rem; letter-spacing: .2em; text-transform: uppercase; color: var(--muted); margin-bottom: 1.5rem; }

  /* KPI Cards */
  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
  .kpi-card {
    background: var(--card-bg); border: 1px solid var(--border); padding: 1.5rem;
  }
  .kpi-label { font-size: .65rem; letter-spacing: .2em; text-transform: uppercase; color: var(--muted); margin-bottom: .5rem; }
  .kpi-value { font-family: var(--serif); font-size: 2.2rem; font-weight: 300; color: var(--dark); }
  .kpi-sub { font-size: .75rem; color: var(--muted); margin-top: .3rem; }

  /* Charts */
  .charts-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 1rem; margin-bottom: 2rem; }
  @media(max-width: 700px) { .charts-grid { grid-template-columns: 1fr; } }
  .chart-card {
    background: var(--card-bg); border: 1px solid var(--border); padding: 1.5rem;
  }
  .chart-title { font-size: .7rem; letter-spacing: .2em; text-transform: uppercase; color: var(--muted); margin-bottom: 1.2rem; }
  canvas { width: 100% !important; }

  /* Country list */
  .country-list { list-style: none; }
  .country-item {
    display: flex; align-items: center; gap: .8rem;
    padding: .5rem 0; border-bottom: 1px solid var(--border); font-size: .85rem;
  }
  .country-item:last-child { border-bottom: none; }
  .country-bar-wrap { flex: 1; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .country-bar { height: 100%; background: var(--accent); border-radius: 2px; transition: width .6s ease; }
  .country-name { min-width: 130px; color: var(--dark); }
  .country-count { min-width: 50px; text-align: right; color: var(--muted); font-size: .8rem; }

  .loading { text-align: center; padding: 4rem; color: var(--muted); font-size: .9rem; letter-spacing: .1em; }
  .error-msg { background: #fff0f0; border: 1px solid #fcc; padding: 1rem; color: #c0392b; font-size: .85rem; border-radius: 2px; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <h1>Barbara Friehs</h1>
    <p>Admin-Bereich</p>
    <input type="password" id="pw-input" placeholder="Passwort" autocomplete="current-password">
    <button id="login-btn">Anmelden</button>
    <p class="login-error" id="login-error">Falsches Passwort.</p>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <header class="dash-header">
    <div>
      <h1>Besucherstatistiken</h1>
      <span>barbarafriehs.at</span>
    </div>
    <button class="logout-btn" id="logout-btn">Abmelden</button>
  </header>

  <div class="dash-content">
    <p class="period-label" id="period-label">Letzte 30 Tage</p>

    <div id="loading" class="loading">Daten werden geladen …</div>
    <div id="error-msg" class="error-msg" style="display:none"></div>

    <div id="stats-content" style="display:none">
      <div class="kpi-grid">
        <div class="kpi-card">
          <div class="kpi-label">Aufrufe gesamt</div>
          <div class="kpi-value" id="kpi-requests">—</div>
          <div class="kpi-sub">HTTP Requests</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">Besuche gesamt</div>
          <div class="kpi-value" id="kpi-visits">—</div>
          <div class="kpi-sub">Unique Visits</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">Heute</div>
          <div class="kpi-value" id="kpi-today">—</div>
          <div class="kpi-sub">Aufrufe heute</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">Ø pro Tag</div>
          <div class="kpi-value" id="kpi-avg">—</div>
          <div class="kpi-sub">Aufrufe/Tag</div>
        </div>
      </div>

      <div class="charts-grid">
        <div class="chart-card">
          <div class="chart-title">Tägliche Aufrufe — letzte 30 Tage</div>
          <canvas id="chart-daily" height="180"></canvas>
        </div>
        <div class="chart-card">
          <div class="chart-title">Top Länder</div>
          <ul class="country-list" id="country-list"></ul>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'bf_admin_pw';

function fmt(n) {
  if (n >= 1000) return (n/1000).toFixed(1).replace('.0','') + 'k';
  return String(n);
}

// Login
const loginScreen = document.getElementById('login-screen');
const dashboard   = document.getElementById('dashboard');
const pwInput     = document.getElementById('pw-input');
const loginBtn    = document.getElementById('login-btn');
const loginError  = document.getElementById('login-error');

const VALID_PW = 'Babsi';

function tryLogin(pw) {
  if (pw !== VALID_PW) {
    loginError.style.display = 'block';
    return;
  }
  loginError.style.display = 'none';
  sessionStorage.setItem(STORAGE_KEY, pw);
  showDashboard(pw);
}

function showDashboard(pw) {
  loginScreen.style.display = 'none';
  dashboard.style.display = 'block';
  loadStats(pw);
}

loginBtn.addEventListener('click', () => tryLogin(pwInput.value.trim()));
pwInput.addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(pwInput.value.trim()); });
document.getElementById('logout-btn').addEventListener('click', () => {
  sessionStorage.removeItem(STORAGE_KEY);
  location.reload();
});

// Auto-login from session
const saved = sessionStorage.getItem(STORAGE_KEY);
if (saved) showDashboard(saved);

async function loadStats(pw) {
  const loading = document.getElementById('loading');
  const errorEl = document.getElementById('error-msg');
  const statsEl = document.getElementById('stats-content');

  loading.style.display = 'block';
  errorEl.style.display = 'none';
  statsEl.style.display = 'none';

  try {
    const res = await fetch('/api/stats?pw=' + encodeURIComponent(pw) + '&t=' + Date.now());
    const json = await res.json();

    if (res.status === 401) {
      loginError.style.display = 'block';
      sessionStorage.removeItem(STORAGE_KEY);
      return;
    }
    if (!res.ok || json.error) throw new Error(json.error || 'Fehler beim Laden');

    const acct = json.data?.viewer?.accounts?.[0];
    if (!acct) throw new Error('Keine Daten verfügbar');

    // Show dashboard
    loginScreen.style.display = 'none';
    dashboard.style.display = 'block';
    loading.style.display = 'none';
    statsEl.style.display = 'block';

    const byDay = acct.byDay || [];
    const byCountry = acct.byCountry || [];

    const today = new Date().toISOString().slice(0,10);
    let totalReq = 0, totalVisits = 0, todayReq = 0;
    byDay.forEach(d => {
      totalReq += d.count || 0;
      totalVisits += d.sum?.visits || 0;
      if (d.dimensions.date === today) todayReq = d.count || 0;
    });
    const avg = byDay.length ? Math.round(totalReq / byDay.length) : 0;

    document.getElementById('kpi-requests').textContent = fmt(totalReq);
    document.getElementById('kpi-visits').textContent   = fmt(totalVisits);
    document.getElementById('kpi-today').textContent    = fmt(todayReq);
    document.getElementById('kpi-avg').textContent      = fmt(avg);

    drawChart(byDay);
    drawCountries(byCountry);

  } catch(e) {
    loading.style.display = 'none';
    errorEl.style.display = 'block';
    errorEl.textContent = 'Fehler: ' + e.message;
    // Show dashboard frame even on error if we're already logged in
    if (dashboard.style.display === 'none') {
      loginError.style.display = 'block';
      sessionStorage.removeItem(STORAGE_KEY);
    }
  }
}

function drawChart(byDay) {
  const canvas = document.getElementById('chart-daily');
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.parentElement.clientWidth - 48;
  const H = 180;
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  ctx.scale(dpr, dpr);

  const vals = byDay.map(d => d.count || 0);
  const max  = Math.max(...vals, 1);
  const pad  = { t: 10, r: 10, b: 30, l: 40 };
  const cw   = W - pad.l - pad.r;
  const ch   = H - pad.t - pad.b;
  const barW = Math.max(2, cw / vals.length - 2);

  ctx.clearRect(0, 0, W, H);

  // Grid lines
  ctx.strokeStyle = 'rgba(26,22,18,.06)';
  ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = pad.t + ch * (1 - i/4);
    ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(W - pad.r, y); ctx.stroke();
    ctx.fillStyle = 'rgba(26,22,18,.3)';
    ctx.font = '10px system-ui';
    ctx.textAlign = 'right';
    ctx.fillText(fmt(Math.round(max * i/4)), pad.l - 5, y + 3);
  }

  // Bars
  vals.forEach((v, i) => {
    const x = pad.l + i * (cw / vals.length);
    const h = (v / max) * ch;
    const y = pad.t + ch - h;
    ctx.fillStyle = 'rgba(200,168,130,.7)';
    ctx.fillRect(x, y, barW, h);
  });

  // X labels (every 7 days)
  ctx.fillStyle = 'rgba(26,22,18,.35)';
  ctx.font = '9px system-ui';
  ctx.textAlign = 'center';
  byDay.forEach((d, i) => {
    if (i % 7 !== 0) return;
    const x = pad.l + i * (cw / vals.length) + barW/2;
    const label = d.dimensions.date.slice(5); // MM-DD
    ctx.fillText(label, x, H - pad.b + 14);
  });
}

function drawCountries(byCountry) {
  const list = document.getElementById('country-list');
  list.innerHTML = '';
  const maxV = byCountry[0]?.sum?.visits || 1;
  byCountry.forEach(c => {
    const name = c.dimensions.clientCountryName || 'Unbekannt';
    const v    = c.sum?.visits || 0;
    const pct  = Math.round((v / maxV) * 100);
    const li   = document.createElement('li');
    li.className = 'country-item';
    li.innerHTML = `
      <span class="country-name">${name}</span>
      <div class="country-bar-wrap"><div class="country-bar" style="width:${pct}%"></div></div>
      <span class="country-count">${fmt(v)}</span>`;
    list.appendChild(li);
  });
}
</script>
</body>
</html>
